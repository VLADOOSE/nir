spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nirdb
    username: postgres
    password: admin

  sql:
    init:
      mode: always

  jackson:
    serialization:
      fail-on-empty-beans: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none    # schema.sql управляет схемой

server:
  port: 8080
