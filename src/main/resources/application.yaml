spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nirdb
    username: postgres
    password: admin

  mail:
    # DEV: MailHog — фейковый SMTP без auth, UI на http://localhost:8025
    # Запуск: docker run -d --name nir2-mailhog -p 1025:1025 -p 8025:8025 mailhog/mailhog
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:noreply@regionmed.local}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls.enable: false

  # Схема и данные — через Flyway-миграции (src/main/resources/db/migration), НЕ пересоздаются при старте.
  # Раньше schema.sql+data.sql с mode:always дропали все таблицы каждый запуск (данные слетали).
  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # для уже существующей боевой БД (накатывает недостающие миграции)

  jackson:
    serialization:
      fail-on-empty-beans: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none    # схему ведёт Flyway

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

mail:
  imap:
    enabled: ${MAIL_IMAP_ENABLED:false}
    host: ${MAIL_IMAP_HOST:localhost}
    port: ${MAIL_IMAP_PORT:3143}
    username: ${MAIL_IMAP_USERNAME:zakup@westmed.kz}
    password: ${MAIL_IMAP_PASSWORD:}
    protocol: ${MAIL_IMAP_PROTOCOL:imap}
    market: ${MAIL_IMAP_MARKET:KZ}
    poll-ms: ${MAIL_IMAP_POLL_MS:300000}
    # обрабатывать только письма за последние N минут (не трогаем старый бэклог ящика)
    since-minutes: ${MAIL_IMAP_SINCE_MINUTES:60}

goszakup:
  api:
    base-url: ${GOSZAKUP_BASE_URL:https://ows.goszakup.gov.kz/v2}
    token: ${GOSZAKUP_TOKEN:}
    page-size: ${GOSZAKUP_PAGE_SIZE:50}
  import:
    enabled: ${GOSZAKUP_IMPORT_ENABLED:false}
    poll-ms: ${GOSZAKUP_POLL_MS:21600000}   # 6 часов
    since-days: ${GOSZAKUP_SINCE_DAYS:30}
    # глубина ленты: лента ~1000-3000 объявлений/сутки, 60 страниц × 50 ≈ 2-3 дня;
    # с отсечкой по since-days (страница целиком старше cutoff → стоп) можно поднимать смело
    max-pages: ${GOSZAKUP_MAX_PAGES:60}
    # пустой statuses = брать все статусы (точные id активных статусов уточняются токеном, Task 9)
    statuses: ${GOSZAKUP_STATUSES:}
    keywords: ${GOSZAKUP_KEYWORDS:аппарат,узи,ультразвук,томограф,рентген,монитор пациента,дефибриллятор,ивл,наркозн,анализатор,центрифуг,стерилизатор,автоклав,эндоскоп,маммограф,флюорограф,электрокардиограф,кардиомонитор,инкубатор,облучатель,спирометр,хирургическ,реанимац,медицинск}
