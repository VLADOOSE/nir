spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nirdb
    username: postgres
    password: admin

  mail:
    host: smtp.mail.ru
    port: 465
    username: ${MAIL_USERNAME:test@mail.ru}
    password: ${MAIL_PASSWORD:password}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl.enable: true

  sql:
    init:
      mode: always

  jackson:
    serialization:
      fail-on-empty-beans: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none    # schema.sql управляет схемой

server:
  port: 8080
