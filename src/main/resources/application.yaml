spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nirdb
    username: postgres
    password: admin

  mail:
    # DEV: MailHog — фейковый SMTP без auth, UI на http://localhost:8025
    # Запуск: docker run -d --name nir2-mailhog -p 1025:1025 -p 8025:8025 mailhog/mailhog
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:noreply@regionmed.local}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls.enable: false

  sql:
    init:
      mode: always

  jackson:
    serialization:
      fail-on-empty-beans: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none    # schema.sql управляет схемой

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
