# nginx ВНУТРИ контейнера ais-frontend (не хостовый!). Отдаёт Angular-статику и проксирует /api
# на бэкенд по имени сервиса docker-сети. Наружу торчит только через 127.0.0.1:8090 → tailscale serve.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip для бандлов Angular
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://ais-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # разбор ТЗ / загрузка вложений могут быть долгими
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 15m;   # импорт Excel/вложения
    }

    # SPA-fallback: любой маршрут Angular отдаёт index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
