name: deploy

# push в main → собрать образы на раннерах GitHub → GHCR → сервер тянет и перезапускает.
# Сборка НЕ на сервере (там 3.8 ГБ и два живых сайта). Ручной запуск — workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: vladoose        # GHCR-неймспейс (в нижнем регистре!)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nir-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nir-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nir-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nir-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Postgres image (кастомная локаль en_US.UTF-8)
        uses: docker/build-push-action@v6
        with:
          context: ./docker/postgres
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/nir-postgres:16

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server over SSH
        # DEPLOY_SSH_KEY хранится как base64 приватного ключа (одна строка) — иначе переносы
        # многострочного PEM бьются при копировании в секрет → «error in libcrypto» у ssh.
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # доставляем актуальный compose и перезапускаем на свежих образах
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            docker-compose.yml "$USER@$HOST:/srv/ais/docker-compose.yml"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new "$USER@$HOST" \
            'cd /srv/ais && docker compose pull && docker compose up -d && docker image prune -f'
